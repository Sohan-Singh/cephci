# RHCS 8.x sanity test suite for RGW daemon.
# conf : conf/squid/rgw/tier-0_rgw.yaml
tests:

  # Cluster deployment stage

  - test:
      abort-on-fail: true
      desc: Install software pre-requisites for cluster deployment.
      module: install_prereq.py
      name: setup pre-requisites

  - test:
      abort-on-fail: true
      config:
        verify_cluster_health: true
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                registry-url: registry.redhat.io
                mon-ip: node1
                initial-dashboard-password: admin@123
                dashboard-password-noupdate: true
                orphan-initial-daemons: true
                skip-monitoring-stack: true
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels

          - config:
              command: apply
              service: mgr
              args:
                placement:
                  label: mgr


          - config:
              command: apply
              service: mon
              args:
                placement:
                  label: mon

          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
          - config:
              command: apply
              service: rgw
              pos_args:
                - rgw.1
              args:
                placement:
                  label: rgw
      desc: bootstrap with registry-url option and deployment services.
      destroy-cluster: false
      polarion-id: CEPH-83573713
      module: test_cephadm.py
      name: RHCS deploy cluster using cephadm

  - test:
      abort-on-fail: true
      config:
        command: add
        id: client.1
        node: node4
        install_packages:
          - ceph-common
        copy_admin_keyring: true
        git_clone: true
        git_node_role: rgw
      desc: Configure the RGW client system
      polarion-id: CEPH-83573758
      destroy-cluster: false
      module: test_client.py
      name: configure client
  - test:
      abort-on-fail: true
      config:
        install:
          - agent
      desc: Setup and configure vault agent
      destroy-cluster: false
      module: install_vault.py
      name: configure vault agent
      polarion-id: CEPH-83575226


  - test:
      name: Monitoring Services deployment
      desc: Add monitoring services using spec file.
      module: test_cephadm.py
      polarion-id: CEPH-83574727
      config:
        steps:
          - config:
              command: apply_spec
              service: orch
              validate-spec-services: true
              specs:
                - service_type: prometheus
                  placement:
                    count: 1
                    nodes:
                      - node1
                - service_type: grafana
                  placement:
                    nodes:
                      - node1
                - service_type: alertmanager
                  placement:
                    count: 1
                - service_type: node-exporter
                  placement:
                    host_pattern: "*"
                - service_type: crash
                  placement:
                    host_pattern: "*"

  - test:
      name: test basic object operations with swift
      desc: Test basic object operations with swift
      polarion-id: CEPH-11019
      module: sanity_rgw.py
      config:
        script-name: test_swift_basic_ops.py
        config-file-name: test_swift_basic_ops.yaml
        run-on-rgw: true

  - test:
      name: S3CMD basic  operations
      desc: S3CMD basic  operations
      polarion-id: CEPH-83573244
      module: sanity_rgw.py
      config:
        script-name: ../s3cmd/test_s3cmd.py
        config-file-name: ../../s3cmd/configs/test_s3cmd.yaml

  - test:
      name: Parallel run test for empty bucket notification and bi purge
      module: test_parallel.py
      parallel:
        - test:
            name: test bucket notification with empty configuration
            desc: verify empty bucket notification deletes the existing configuration
            module: sanity_rgw.py
            polarion-id: CEPH-83575035
            config:
              run-on-rgw: true
              install_common: false
              extra-pkgs:
                - jdk
              install_start_kafka: true
              script-name: test_bucket_notifications.py
              config-file-name: test_empty_bucket_notification_kafka_broker.yaml
        - test:
            name: test_bi_purge for a bucket
            desc: test bi_purge should not error
            module: sanity_rgw.py
            polarion-id: CEPH-83575234
            config:
              install_common: false
              script-name: test_Mbuckets_with_Nobjects.py
              config-file-name: test_bi_purge.yaml